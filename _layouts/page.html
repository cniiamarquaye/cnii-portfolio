---
layout: default
---

<section class="max-w-4xl mx-auto px-6 py-20">

  <header class="mb-16">
    <h1 class="text-4xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">
      {{ page.title }}
    </h1>

    {% if page.subtitle %}
      <p class="mt-4 text-lg text-slate-600 dark:text-slate-400">
        {{ page.subtitle }}
      </p>
    {% endif %}
  </header>

  <div class="prose prose-slate dark:prose-invert max-w-none prose-headings:font-semibold prose-h2:text-2xl prose-h3:text-lg">
    {{ content }}
  </div>

</section>
